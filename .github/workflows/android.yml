name: Android CI

on:
  push:
    branches: [ main, "claude/**" ]
    paths: [ "android/**", ".github/workflows/android.yml" ]
  pull_request:
    paths: [ "android/**", ".github/workflows/android.yml" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build · unit · R8 · AAB · lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure secrets (local.properties)
        run: |
          {
            echo "RAPIDAPI_KEY=${{ secrets.RAPIDAPI_KEY }}"
            echo "ASCEND_API_BASE_URL=${{ secrets.ASCEND_API_BASE_URL }}"
          } >> local.properties
        # Blank values fall back to defaults in app/build.gradle.kts, so the
        # build compiles even without secrets configured.

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Assemble release (R8/minify gate)
        # Builds the minified, resource-shrunk release APK (unsigned) so R8 +
        # the ProGuard keep rules are actually exercised — catches missing
        # serialization/Retrofit keep rules that assembleDebug never would.
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Bundle release (AAB — the Play upload artifact)
        run: ./gradlew :app:bundleRelease --stacktrace

      - name: Lint release (blocking)
        # Blocking quality gate on the release variant. Fails the build on lint
        # errors (not warnings). Runs after artifacts are built so uploads below
        # (if: always()) still publish even when lint fails.
        run: ./gradlew :app:lintRelease --stacktrace

      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: warn

      - name: Upload release AAB
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: warn

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: |
            android/app/build/reports/lint-results-release.html
            android/app/build/reports/lint-results-release.xml
          if-no-files-found: warn
